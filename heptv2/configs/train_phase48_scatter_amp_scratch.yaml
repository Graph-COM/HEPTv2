# Train the current low-latency phase48 scatter AMP model from scratch.
# This keeps validation metrics on the same compact inference path used by
# `finetune_phase48_scatter_amp.yaml` and the latency benchmark, but does not
# load any checkpoint weights.

device: cuda:4
seed: 42
num_threads: 4
num_workers: 0
note: phase48_scatter_fp32_attnmask_scratch

# Must be applied before postprocess is imported. `run_train.py` reads this file
# directly so the final low-latency postprocess env matches inference/benchmark.
env_file: codex_tools/env_phase48_scatter_amp_best.sh
compile_whole_model: false
compile_train_methods: false

data_root: data/tracking
dataset_name: trackml-large

only_eval: false

model_name: trans_hept
model_kwargs:
  encoder_block_size: 1023
  decoder_block_size: 1023
  n_hashes: 3
  num_regions: 100
  pe_type: learned
  num_heads: 8
  h_dim: 128
  n_layers: 4
  mlp_ratio: 1.0
  fixed_seq_len: 74040
  num_w_per_dist: 10
  encoder_serialization_types: [random_lsh, random_lsh, random_lsh, random_lsh]
  encoder_hilbert_bits: 10
  decoder_serialization_type: none
  decoder_hilbert_bits: 10
  num_queries: 3000
  num_dec_layers: 2
  decoder_overlap: false
  deep_supervision: true
  use_attn_mask: true
  mlp_out_hidden_channels: 256
  mlp_out_num_layers: 5

loss_kwargs:
  loss_ce: 0.1
  loss_mask: 200
  loss_dice: 2
  eos_coef: 1
  clf_loss: 1.8
  clf_pos_weight: 6.0
  nce_weight: 12.0

optimizer_name: muon
optimizer_kwargs:
  lr: 2.5e-4
  adamw_lr: 2.5e-4

lr_scheduler_name: warmup_hold_cosine
lr_scheduler_kwargs:
  total_epochs: 250
  warmup_epochs: 5
  hold_until_epoch: 100
  decay_end_epoch: 200
  decay_min_factor: 0.1

num_epochs: 250
batch_size: 1

amp:
  enabled: false

train_decoder_splitting:
  random_shift: false

inference_path:
  compact_assignment: true
  dynamic_pad: true
  match_fixed_region_bins: true
  pad_buckets: [
    4092, 8184, 12276, 16368, 20460, 24552, 28644, 32736, 36828,
    40920, 45012, 49104, 53196, 57288, 61380, 65472, 69564, 73656,
    77748
  ]

eval:
  eta_abs_max: 4.0
  compute_metrics: true
  compute_loss: false
  metric_path: inference
  pt_thld: 0.9
  predicted_count_thld: 3
  min_track_length: 0
  num_sub_events: 3

postprocessing:
  clf_recall: 1.0
  decoder_score_threshold: -3.4
  decoder_active_prob_power: 0.02
  decoder_score_mode: clamp_logprob
  decoder_batched_decode: true
  decoder_compile_batched_decode: true
  embeddings_already_normalized: true
  codex_fused_nomask_target: true
  codex_fused_pad_length: 0

best_metric_key: dm
best_metric_mode: max
